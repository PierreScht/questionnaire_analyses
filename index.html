<!DOCTYPE html>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f7f7f7;

      max-width: 1000px;
      margin: 0 auto;

      font-size: 2rem;
    }

      margin-top: 0;
      margin-bottom: 30px;
      color: #666;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .card a {
      text-decoration: none;
      color: #1d3557;
      font-weight: bold;
      font-size: 1.05rem;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #666;
    }

  </style>
</head>
